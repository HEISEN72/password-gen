<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор паролей</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Генератор паролей</h1>

        <form method="POST">
            <label for="length">Желаемая длина пароля:</label>
            <input type="number" id="length" name="length" min="5" value="12" required>
            <button type="submit">Сгенерировать</button>
        </form>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        {% if password %}
            <div class="result-box">
                <p>Ваш пароль:</p>
                <input type="text" class="password-output" value="{{ password }}" readonly>
            </div>
        {% endif %}
    </div>
</body>
</html>
